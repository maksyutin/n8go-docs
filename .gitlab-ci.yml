# ─────────────────────────────────────────────────────────────────────────────
# n8go-docs — GitLab CI/CD
#
# Registry:  GitLab Container Registry ($CI_REGISTRY)
# Deploy:    Docker over SSH (same provider-docker-ssh.sh contract)
# Branch:    main → stage | tag v* → prod (manual)
# ─────────────────────────────────────────────────────────────────────────────

# ── Global defaults ───────────────────────────────────────────────────────────
default:
  image: golang:1.25-alpine
  tags: [docker]
  interruptible: true

# ── Stage order ───────────────────────────────────────────────────────────────
stages:
  - install
  - lint
  - test
  - build
  - docker
  - deploy
  - notify

# ── Variables ─────────────────────────────────────────────────────────────────
variables:
  BINARY_NAME:     n8go-docs
  BINARY_DIR:      pkg
  GO_MODULE_DIR:   pkg
  # Cache key shared across jobs on the same branch
  GOPATH:          "$CI_PROJECT_DIR/.go"
  GOMODCACHE:      "$CI_PROJECT_DIR/.go/pkg/mod"
  GOCACHE:         "$CI_PROJECT_DIR/.go/cache"
  IMAGE_BASE:      "$CI_REGISTRY_IMAGE"
  COMPOSE_SERVICE: app
  COMPOSE_DIR:     /opt/app
  HEALTHCHECK_URL: http://localhost:8080/health
  HC_RETRIES:      "12"
  HC_INTERVAL:     "5"

# ── Cache template ────────────────────────────────────────────────────────────
.go-cache: &go-cache
  cache:
    key: go-$CI_COMMIT_REF_SLUG
    paths:
      - .go/pkg/mod
      - .go/cache
    policy: pull-push

# ── Skip push/deploy for MRs ──────────────────────────────────────────────────
.only-branches: &only-branches
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never

# ═════════════════════════════════════════════════════════════════════════════
# INSTALL — warm the module cache
# ═════════════════════════════════════════════════════════════════════════════
install:
  stage: install
  <<: *go-cache
  script:
    - cd $GO_MODULE_DIR
    - go mod download
    - go mod verify
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

# ═════════════════════════════════════════════════════════════════════════════
# LINT
# ═════════════════════════════════════════════════════════════════════════════
lint:gofmt:
  stage: lint
  <<: *go-cache
  needs: [install]
  script:
    - cd $BINARY_DIR
    - UNFORMATTED=$(gofmt -l .)
    - |
      if [ -n "$UNFORMATTED" ]; then
        echo "Unformatted files: $UNFORMATTED"
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

lint:vet:
  stage: lint
  <<: *go-cache
  needs: [install]
  script:
    - cd $BINARY_DIR
    - go vet ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

lint:golangci:
  stage: lint
  image: golangci/golangci-lint:latest-alpine
  <<: *go-cache
  needs: [install]
  script:
    - cd $BINARY_DIR
    - golangci-lint run --timeout=5m ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

# ═════════════════════════════════════════════════════════════════════════════
# TEST
# ═════════════════════════════════════════════════════════════════════════════
test:
  stage: test
  <<: *go-cache
  needs: [install]
  script:
    - cd $BINARY_DIR
    - go test -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -html=coverage.out -o coverage.html
    - go tool cover -func=coverage.out | tail -1
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - $BINARY_DIR/coverage.out
      - $BINARY_DIR/coverage.html
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $BINARY_DIR/coverage.out
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

# ═════════════════════════════════════════════════════════════════════════════
# BUILD
# ═════════════════════════════════════════════════════════════════════════════
build:
  stage: build
  <<: *go-cache
  needs: [test]
  variables:
    CGO_ENABLED: "0"
    GOOS:        linux
    GOARCH:      amd64
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="$CI_COMMIT_TAG"
      else
        VERSION="0.0.0-${CI_COMMIT_SHORT_SHA}"
      fi
    - |
      cd $BINARY_DIR
      go build \
        -trimpath \
        -ldflags="-s -w \
          -X n8go-docs/core.ProgramVersion=${VERSION} \
          -X main.commit=${CI_COMMIT_SHA} \
          -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -o ../dist/${BINARY_NAME} \
        .
  artifacts:
    expire_in: 1 hour
    paths:
      - dist/$BINARY_NAME
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

# ═════════════════════════════════════════════════════════════════════════════
# DOCKER — build & push (not on MR)
# ═════════════════════════════════════════════════════════════════════════════
docker:build-push:
  stage: docker
  image: docker:26-dind
  needs: [build]
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - SHORT_SHA="${CI_COMMIT_SHORT_SHA}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
        SEMVER="${TAG#v}"
        MINOR="${SEMVER%.*}"
        MAJOR="${MINOR%.*}"
        TAGS="-t ${IMAGE_BASE}:${TAG} -t ${IMAGE_BASE}:${SEMVER} -t ${IMAGE_BASE}:${MINOR} -t ${IMAGE_BASE}:${MAJOR} -t ${IMAGE_BASE}:latest"
        PRIMARY_TAG="${IMAGE_BASE}:${TAG}"
      else
        TAGS="-t ${IMAGE_BASE}:latest -t ${IMAGE_BASE}:sha-${SHORT_SHA}"
        PRIMARY_TAG="${IMAGE_BASE}:sha-${SHORT_SHA}"
      fi
    # Build with registry cache
    - |
      docker buildx create --use --driver docker-container 2>/dev/null || true
      docker buildx build \
        --push \
        --cache-from "type=registry,ref=${IMAGE_BASE}:buildcache" \
        --cache-to   "type=registry,ref=${IMAGE_BASE}:buildcache,mode=max" \
        --build-arg  BINARY_NAME=${BINARY_NAME} \
        $TAGS \
        .
    - echo "PRIMARY_IMAGE=${PRIMARY_TAG}" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 hour
  rules:
    # No push for MRs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

# ═════════════════════════════════════════════════════════════════════════════
# DEPLOY — stage (main branch, auto)
# ═════════════════════════════════════════════════════════════════════════════
deploy:stage:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker:build-push
      artifacts: true
  environment:
    name: stage
    url: https://stage.example.com
  before_script:
    - apk add --no-cache openssh-client curl jq bash
    - mkdir -p ~/.ssh
    - echo "$STAGE_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -p "${STAGE_SSH_PORT:-22}" "$STAGE_SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      export SSH_HOST="$STAGE_SSH_HOST"
      export SSH_USER="$STAGE_SSH_USER"
      export SSH_PORT="${STAGE_SSH_PORT:-22}"
      export REGISTRY="$CI_REGISTRY"
      export REGISTRY_USER="$CI_REGISTRY_USER"
      export REGISTRY_PASS="$CI_REGISTRY_PASSWORD"
      export IMAGE="$PRIMARY_IMAGE"
      export COMPOSE_FILE="docker-compose.stage.yml"
      export HC_URL="$HEALTHCHECK_URL"
      export HC_RETRIES="$HC_RETRIES"
      export HC_INTERVAL="$HC_INTERVAL"
      bash .gitlab/scripts/provider-docker-ssh.sh
  after_script:
    - rm -f ~/.ssh/deploy_key
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ═════════════════════════════════════════════════════════════════════════════
# DEPLOY — prod (semver tag, manual approval)
# ═════════════════════════════════════════════════════════════════════════════
deploy:prod:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker:build-push
      artifacts: true
  environment:
    name: prod
    url: https://example.com
  when: manual    # ← manual approval gate
  before_script:
    - apk add --no-cache openssh-client curl jq bash
    - mkdir -p ~/.ssh
    - echo "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -p "${PROD_SSH_PORT:-22}" "$PROD_SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      export SSH_HOST="$PROD_SSH_HOST"
      export SSH_USER="$PROD_SSH_USER"
      export SSH_PORT="${PROD_SSH_PORT:-22}"
      export REGISTRY="$CI_REGISTRY"
      export REGISTRY_USER="$CI_REGISTRY_USER"
      export REGISTRY_PASS="$CI_REGISTRY_PASSWORD"
      export IMAGE="$PRIMARY_IMAGE"
      export COMPOSE_FILE="docker-compose.prod.yml"
      export HC_URL="$HEALTHCHECK_URL"
      bash .gitlab/scripts/provider-docker-ssh.sh
  after_script:
    - rm -f ~/.ssh/deploy_key
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
    - when: never

# ═════════════════════════════════════════════════════════════════════════════
# NOTIFICATIONS
# ═════════════════════════════════════════════════════════════════════════════
.notify-template: &notify-template
  stage: notify
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq

notify:success:
  <<: *notify-template
  needs: [deploy:stage, deploy:prod]
  script:
    - |
      bash .gitlab/scripts/notify-telegram.sh \
        "success" \
        "${CI_ENVIRONMENT_NAME:-unknown}" \
        "docker-ssh" \
        "${PRIMARY_IMAGE:-unknown}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_TAG =~ /^v/
      when: on_success

notify:failure:
  <<: *notify-template
  needs:
    - job: deploy:stage
      optional: true
    - job: deploy:prod
      optional: true
  script:
    - |
      bash .gitlab/scripts/notify-telegram.sh \
        "failure" \
        "${CI_ENVIRONMENT_NAME:-unknown}" \
        "docker-ssh" \
        "${PRIMARY_IMAGE:-unknown}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_failure
    - if: $CI_COMMIT_TAG =~ /^v/
      when: on_failure
