{{ if gt (len .Children) 0 }}
<li class="md-nav__item md-nav__item--section md-nav__item--nested">
    <input class="md-nav__toggle md-toggle" type="checkbox" id="nav-{{ .Name }}" {{ if .Active }}checked{{ end }}>
    <label class="md-nav__link" for="nav-{{ .Name }}">
        <span class="md-ellipsis">{{ .Name }}</span>
        <span class="md-nav__icon md-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z"/></svg>
        </span>
    </label>
    <nav class="md-nav" aria-label="{{ .Name }}">
        <ul class="md-nav__list">
            {{ range .Children }}{{ template "nav.html" . }}{{ end }}
        </ul>
    </nav>
</li>
{{ else }}
<li class="md-nav__item">
    <a class="md-nav__link{{ if .Active }} md-nav__link--active{{ end }}" href="{{ .Url }}">
        <span class="md-ellipsis">{{ .Name }}</span>
    </a>
</li>
{{ end }}
