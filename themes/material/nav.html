{% if nav_item.children %}
<li class="md-nav__item md-nav__item--section md-nav__item--nested">
    <input class="md-nav__toggle md-toggle" type="checkbox" id="nav-{{ nav_item.title }}" {% if nav_item.active %}checked{% endif %}>
    <label class="md-nav__link" for="nav-{{ nav_item.title }}">
        <span class="md-ellipsis">{{ nav_item.title }}</span>
        <span class="md-nav__icon md-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z"/></svg>
        </span>
    </label>
    <nav class="md-nav" aria-label="{{ nav_item.title }}">
        <ul class="md-nav__list">
            {% for child in nav_item.children %}
                {% set nav_item = child %}
                {% include "nav.html" %}
            {% endfor %}
        </ul>
    </nav>
</li>
{% else %}
<li class="md-nav__item">
    <a class="md-nav__link{% if nav_item.active %} md-nav__link--active{% endif %}" href="{{ nav_item.url|url }}">
        <span class="md-ellipsis">{{ nav_item.title }}</span>
    </a>
</li>
{% endif %}
