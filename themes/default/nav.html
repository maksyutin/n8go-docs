{% if nav_item.children %}
    <div class="nav-item header">{{ nav_item.title }}</div>
    <div class="sublist">
        {% for child in nav_item.children %}
            {% set nav_item = child %}
            {% include "nav.html" %}
        {% endfor %}
    </div>
{% else %}
    <a class="nav-item {% if nav_item.active %}active{% endif %}" href="{{ nav_item.url|url }}"{% if nav_item.active %} aria-current="page"{% endif %}>{{ nav_item.title }}</a>
{% endif %}
